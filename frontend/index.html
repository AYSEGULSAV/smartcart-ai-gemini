<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SmartCart AI - VS Code Çalışma Alanı</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen text-slate-100 flex items-center justify-center p-4">
    <div class="max-w-2xl w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <header class="mb-6 text-center">
            <span class="px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/30 text-xs text-blue-400 font-medium">
                ⚡ Google Gemini API Entegreli Sunucu
            </span>
            <h1 class="text-3xl font-extrabold text-white mt-3">SmartCart <span class="text-blue-500">AI Engine</span></h1>
            <p class="text-slate-400 text-sm mt-1">Elinizdeki malzemeleri girin, eksikleri e-ticaret sepetine ekleyelim.</p>
        </header>

        <div class="space-y-4">
            <div>
                <input type="text" id="ingredientsInput" placeholder="Örn: Makarna, sarımsak, salça" 
                       class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-slate-500">
            </div>
            <button onclick="generateRecipe()" id="submitBtn" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition shadow-lg shadow-blue-600/20">
                Tarif ve Eksikleri Analiz Et
            </button>
        </div>

        <!-- Yanıt Alanı -->
        <div id="resultContainer" class="hidden mt-8 pt-6 border-t border-slate-700 space-y-6">
            <div class="bg-slate-900/50 p-5 rounded-xl border border-slate-700">
                <h2 id="recipeTitle" class="text-xl font-bold text-blue-400 mb-3"></h2>
                <ul id="recipeInstructions" class="list-disc pl-5 space-y-2 text-slate-300 text-sm"></ul>
            </div>

            <div id="upsellPanel" class="bg-gradient-to-br from-blue-900/40 to-slate-900 p-5 rounded-xl border border-blue-500/20">
                <h3 class="text-sm font-semibold text-blue-300 uppercase tracking-wider mb-3">🛒 Market Sepetine Önerilen Eksikler</h3>
                <ul id="recommendedProductsList" class="space-y-2 mb-4"></ul>
                <button id="addToCartBtn" onclick="alert('Ürünler sepetinize başarıyla eklendi!')" 
                        class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-3 rounded-xl font-bold text-sm shadow-md hover:opacity-90 transition">
                </button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
